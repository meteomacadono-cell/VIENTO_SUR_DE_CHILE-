  align-items:center;
  padding:10px;

}

.menu-btn {

  background:none;

}

}

}

}

}

}

.sidebar.open {

}

.alert {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111822;
  padding:15px;
  display:none;
}

.alert.open {
  display:block;
}
</style>
</head>

let i = 0
let timer = null

const img = document.getElementById("img")

function show() {
  img.src = frames[i]
}

function next() {
  i = (i + 1) % frames.length
  show()
}

function prev() {
  i = (i - 1 + frames.length) % frames.length
  show()
}

function play() {
  stop()
  timer = setInterval(next, 500)
}

function stop() {
  clearInterval(timer)
}

function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open")
}

function selectZona(z) {
  zona = z
  frames = FRAMES[z]
  i = 0
  show()
  toggleMenu()

  let alert = document.getElementById("alert")
  alert.classList.add("open")
  document.getElementById("alert-text").innerHTML = "Zona: " + z
}

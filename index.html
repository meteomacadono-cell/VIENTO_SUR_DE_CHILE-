const img = document.getElementById("img");

function init() {
    const container = document.getElementById("btn-container");
    for (let key in ZONAS) {
        let btn = `<button class="btn-zone" onclick="selectZona('${key}')">${ZONAS[key].nombre}</button>`;
        container.innerHTML += btn;
    }
}

function selectZona(z) {
    currentZona = z;
    document.getElementById("title").innerText = ZONAS[z].nombre;
    document.getElementById("aviso-text").innerText = ZONAS[z].aviso;
    i = 0; show(); play();
}

function show() { img.src = ZONAS[currentZona].frames[i]; }
function next() { i = (i + 1) % ZONAS[currentZona].frames.length; show(); }
function prev() { i = (i - 1 + ZONAS[currentZona].frames.length) % ZONAS[currentZona].frames.length; show(); }
function play() { stop(); timer = setInterval(next, 500); }
function stop() { clearInterval(timer); }

init();

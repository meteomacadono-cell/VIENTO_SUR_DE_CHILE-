<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VISOR MAPA VIENTO 10 m</title>
<style>
  :root {
    --bg:#071018;
    --panel:#0c1824;
    --panel2:#102130;
    --line:#20374b;
    --txt:#eef6ff;
    --muted:#9fb7cc;
    --btn:#17344f;
  }

  * {
    box-sizing:border-box;
  }

  html, body {
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--txt);
    font-family:system-ui,Segoe UI,Roboto,Arial;
  }

  .app {
    width:100%;
    max-width:1600px;
    margin:0 auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .topbar {
    background:linear-gradient(180deg,#102130 0%,#0b1824 100%);
    border:1px solid var(--line);
    border-radius:20px;
    padding:18px 20px;
  }

  .title {
    font-size:1.15rem;
    font-weight:800;
    margin:0 0 4px 0;
  }

  .subtitle {
    color:var(--muted);
    font-size:.95rem;
    margin:0 0 14px 0;
  }

  .topbar-row {
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
  }

  .top-right {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }

  .label-inline {
    font-weight:700;
    color:var(--txt);
  }

  select {
    background:var(--panel2);
    color:var(--txt);
    border:1px solid var(--line);
    padding:12px 14px;
    border-radius:14px;
    font-weight:700;
    font-size:1rem;
    min-width:260px;
  }

  .main {
    display:grid;
    grid-template-columns: 1.55fr .95fr;
    gap:12px;
    align-items:start;
  }

  .card {
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
  }

  .viewer-head {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    padding:18px 18px 14px 18px;
    border-bottom:1px solid var(--line);
  }

  .viewer-title {
    font-size:1.05rem;
    font-weight:800;
    margin:0 0 4px 0;
  }

  .viewer-time {
    font-size:.95rem;
    color:#b8d4f0;
    margin:0;
  }

  .badge {
    border:1px solid #31506d;
    background:#173047;
    color:#d6ebff;
    padding:10px 14px;
    border-radius:999px;
    font-size:1rem;
    font-weight:800;
    white-space:nowrap;
  }

  .stage {
    background:#02101c;
    min-height:640px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:12px;
  }

  #frame {
    max-width:100%;
    max-height:84vh;
    width:auto;
    height:auto;
    object-fit:contain;
    border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.35);
    background:#111822;
    display:block;
  }

  .controls {
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
    padding:14px 16px 16px 16px;
    border-top:1px solid var(--line);
  }

  .ctrl-btn {
    background:var(--btn);
    color:#eef6ff;
    border:1px solid #244766;
    padding:16px 10px;
    border-radius:16px;
    cursor:pointer;
    font-weight:800;
    font-size:1.05rem;
  }

  .ctrl-btn:hover {
    filter:brightness(1.08);
  }

  .side {
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .panel-head {
    padding:16px 18px 10px 18px;
    font-size:1.05rem;
    font-weight:800;
  }

  .panel-body {
    padding:0 18px 18px 18px;
  }

  .alert-box {
    background:#271d26;
    border:1px solid rgba(255,82,82,.35);
    border-radius:18px;
    padding:18px;
    font-size:1.05rem;
    line-height:1.55;
    min-height:220px;
    overflow:auto;
  }

  .dia-item {
    margin-bottom:12px;
    padding-bottom:12px;
    border-bottom:1px solid #233247;
  }

  .dia-item:last-child {
    border-bottom:none;
    margin-bottom:0;
    padding-bottom:0;
  }

  .dia-fecha {
    font-size:1.02rem;
    font-weight:800;
    margin-bottom:6px;
  }

  .sin-alerta {
    color:#96f0a2;
    font-size:1rem;
    font-weight:700;
  }

  .con-alerta {
    color:#ffd6d6;
    font-size:1rem;
    font-weight:800;
  }

  .aviso-btn {
    display:inline-block;
    padding:8px 12px;
    border-radius:10px;
    text-decoration:none;
    font-size:.98rem;
    font-weight:800;
    line-height:1.3;
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:none;
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }

  .aviso-btn.cercano {
    background:#b71c1c;
    color:#ffffff;
  }

  .aviso-btn.lejano {
    background:#d97706;
    color:#ffffff;
  }

  .ref-box {
    color:var(--muted);
    font-size:.95rem;
    line-height:1.5;
  }

  @media (max-width: 1080px) {
    .main {
      grid-template-columns:1fr;
    }

    .side {
      order:1;
    }

    .main > .card:first-child {
      order:2;
    }

    .stage {
      min-height:420px;
    }
  }

  @media (max-width: 700px) {
    .app {
      padding:6px;
      gap:8px;
    }

    .topbar {
      padding:12px;
      border-radius:16px;
    }

    .title {
      font-size:1rem;
    }

    .subtitle {
      font-size:.85rem;
      margin-bottom:10px;
    }

    .top-right {
      justify-content:flex-start;
      width:100%;
    }

    select {
      min-width:100%;
      width:100%;
      font-size:1rem;
      padding:12px;
    }

    .main {
      gap:8px;
    }

    .side {
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .side .card:nth-child(2) {
      order:1;
    }

    .side .card:nth-child(1) {
      order:2;
    }

    .side .card:nth-child(3) {
      order:3;
    }

    .panel-head {
      padding:12px 14px 8px 14px;
      font-size:1rem;
    }

    .panel-body {
      padding:0 14px 14px 14px;
    }

    .alert-box {
      min-height:auto;
      padding:14px;
      font-size:.95rem;
    }

    .viewer-head {
      padding:12px 14px 10px 14px;
    }

    .viewer-title {
      font-size:1rem;
    }

    .viewer-time {
      font-size:.85rem;
    }

    .badge {
      padding:8px 12px;
      font-size:.9rem;
    }

    .stage {
      min-height:unset;
      padding:8px;
    }

    #frame {
      width:100%;
      max-width:100%;
      max-height:none;
      height:auto;
      border-radius:10px;
    }

    .controls {
      gap:8px;
      padding:10px 12px 12px 12px;
    }

    .ctrl-btn {
      padding:12px 4px;
      font-size:1rem;
      border-radius:12px;
    }

    .ref-box {
      font-size:.85rem;
    }
  }
</style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="title">Visor de Viento Operativo</div>
    <div class="subtitle">Visualización tipo app</div>

    <div class="topbar-row">
      <div class="top-right">
        <span class="label-inline">Zona:</span>
        <select id="zone"></select>
      </div>
    </div>
  </div>

  <div class="main">

    <div class="card">
      <div class="viewer-head">
        <div>
          <div class="viewer-title" id="viewer-title">Mapa viento</div>
          <div class="viewer-time" id="viewer-time">Hora</div>
        </div>
        <div class="badge" id="frame-count">0 / 0</div>
      </div>

      <div class="stage">
        <img id="frame" alt="mapa" />
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="prev">⏮</button>
        <button class="ctrl-btn" id="play">▶</button>
        <button class="ctrl-btn" id="pause">⏸</button>
        <button class="ctrl-btn" id="next">⏭</button>
      </div>
    </div>

    <div class="side">
      <div class="card">
        <div class="panel-head">Zona de interés</div>
        <div class="panel-body">
          <select id="sector-select">
            <option value="ACCESO_CANAL_CHACAO">Acceso Canal Chacao</option>
              <option value="PUERTO_MONTT_SENO_RELONCAVI">Puerto Montt y Seno Reloncaví</option>
              <option value="AGUAS_INTERIORES_CH1_CH2">Aguas interiores Chiloé (CH1–CH2)</option>
              <option value="BOCA_GUAFO_GOLFO_CORCOVADO">Boca del Guafo – Golfo Corcovado</option>
              <option value="CANAL_MORALEDA">Canal Moraleda</option>
              <option value="GOLFO_DE_PENAS">Golfo de Penas</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="panel-head">Aviso operativo</div>
        <div class="panel-body">
          <div id="alert-box" class="alert-box">Selecciona una zona.</div>
        </div>
      </div>

      <div class="card">
        <div class="panel-head">Referencia</div>
        <div class="panel-body">
          <div class="ref-box">
            Rojo: aviso cercano.<br>
            Naranjo: aviso previsto.<br>
            Verde: sin señal relevante.
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

const LABELS = {"ACCESO_CANAL_CHACAO": "Acceso Canal Chacao", "PUERTO_MONTT_SENO_RELONCAVI": "Puerto Montt y Seno Reloncaví", "AGUAS_INTERIORES_CH1_CH2": "Aguas interiores Chiloé (CH1–CH2)", "BOCA_GUAFO_GOLFO_CORCOVADO": "Boca del Guafo – Golfo Corcovado", "CANAL_MORALEDA": "Canal Moraleda", "GOLFO_DE_PENAS": "Golfo de Penas"};

let zone = Object.keys(FRAMES)[0];
let frames = FRAMES[zone] || [];
let i = 0;
let timer = null;

const img = document.getElementById("frame");
const zoneSel = document.getElementById("zone");
const viewerTitle = document.getElementById("viewer-title");
const viewerTime = document.getElementById("viewer-time");
const frameCount = document.getElementById("frame-count");
const sectorSelect = document.getElementById("sector-select");

function stop() {
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
}

function parseFechaDesdeNombre(src) {
  const m = src.match(/(\d{8})_(\d{2})(Z|L)/);
  if (!m) return "";
  const ymd = m[1];
  const hh = m[2];
  const suf = m[3];
  return `${ymd.slice(0,4)}-${ymd.slice(4,6)}-${ymd.slice(6,8)} ${hh} ${
    suf === "Z" ? "UTC" : "Hora local"
  }`;
}

function zoneLabel(z) {
  if (z === "CHILOE") return "Chiloé Interior";
  if (z === "CHACAO_PENAS") return "Chacao a Golfo de Penas";
  return z;
}

function setZone(z) {
  stop();
  zone = z;
  frames = FRAMES[zone] || [];
  i = 0;

  viewerTitle.textContent = zoneLabel(zone);

  if (frames.length === 0) {
    img.removeAttribute("src");
    viewerTime.textContent = "Sin imágenes";
    frameCount.textContent = "0 / 0";
    return;
  }
  show(0);
}

function show(k) {
  if (frames.length === 0) return;
  i = (k + frames.length) % frames.length;
  img.src = frames[i];
  viewerTime.textContent = parseFechaDesdeNombre(frames[i]);
  frameCount.textContent = `${i + 1} / ${frames.length}`;
}

function play() {
  if (frames.length === 0) return;
  stop();
  timer = setInterval(() => show(i + 1), 500);
}

function showAlert(punto) {
  const box = document.getElementById("alert-box");
  const data = ALERTAS[punto] || [];
  const label = LABELS[punto] || punto;

  if (data.length === 0) {
    box.innerHTML = "<div style='font-weight:800; font-size:20px; margin-bottom:10px;'>" + label + "</div><div class='sin-alerta'>Sin datos.</div>";
    return;
  }

  let html = `<div style="font-weight:800; font-size:1.15rem; margin-bottom:12px;">${label}</div>`;

  data.forEach(d => {
    const cls = d.txt.toLowerCase().includes("sin señal relevante") ? "sin-alerta" : "con-alerta";
    html += `
      <div class="dia-item">
        <div class="dia-fecha">${d.dia}</div>
        <div class="${cls}">${d.txt}</div>
      </div>
    `;
  });

  box.innerHTML = html;
}

document.getElementById("prev").onclick = () => { stop(); show(i - 1); };
document.getElementById("next").onclick = () => { stop(); show(i + 1); };
document.getElementById("pause").onclick = () => { stop(); };
document.getElementById("play").onclick  = () => { play(); };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") { stop(); show(i - 1); }
  if (e.key === "ArrowRight") { stop(); show(i + 1); }
  if (e.code === "Space") {
    e.preventDefault();
    if (timer) stop(); else play();
  }
});

for (const z of Object.keys(FRAMES)) {
  const opt = document.createElement("option");
  opt.value = z;
  opt.textContent = zoneLabel(z);
  zoneSel.appendChild(opt);
}

zoneSel.onchange = () => setZone(zoneSel.value);
sectorSelect.onchange = () => showAlert(sectorSelect.value);

setZone(zoneSel.value = zone);
sectorSelect.value = "ACCESO_CANAL_CHACAO";
showAlert(sectorSelect.value);
play();
</script>

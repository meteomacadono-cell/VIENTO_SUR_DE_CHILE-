<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VISOR MAPA VIENTO 10 m</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: system-ui, Segoe UI, Roboto, Arial;
    background:#0b0f14;
    color:#e8eef7;
  }

  .wrap {
    height: 100%;
    display: grid;
    grid-template-rows: auto auto 1fr;
  }

  header {
    padding: 10px 12px 6px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 12px;
    flex-wrap: wrap;
    font-weight: 750;
  }

  .top-controls {
    padding: 6px 12px 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stage {
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 4px 10px 12px;
  }

  img {
    max-width: min(92vw, 1100px);
    max-height: 82vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(0,0,0,.45);
    background: #111822;
  }

  button {
    background:#1c2633;
    color:#e8eef7;
    border:1px solid #2b3b52;
    padding:6px 10px;
    border-radius:10px;
    cursor:pointer;
    font-weight:650;
    font-size:13px;
  }

  button:hover { filter: brightness(1.08); }

  select {
    background:#111822;
    color:#e8eef7;
    border:1px solid #2b3b52;
    padding:6px 10px;
    border-radius:10px;
    font-weight:650;
    font-size:13px;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <span>VISOR MAPA VIENTO 10 m</span>
    <span>Zona:
      <select id="zone"></select>
    </span>
  </header>

  <div class="top-controls">
    <button id="prev">⟵ Atrás</button>
    <button id="play">▶ Play</button>
    <button id="pause">⏸ Pause</button>
    <button id="next">Adelante ⟶</button>

    <span>Velocidad:
      <select id="speed">
        <option value="200">0.2 s</option>
        <option value="300">0.3 s</option>
        <option value="400">0.4 s</option>
        <option value="500">0.5 s</option>
        <option value="500" selected>0.5 s</option>
        <option value="1200">1.2 s</option>
        <option value="1600">1.6 s</option>
        <option value="2000">2.0 s</option>
      </select>
    </span>
  </div>

  <div class="stage">
    <img id="frame" alt="mapa" />
  </div>

</div>

let zone = Object.keys(FRAMES)[0];
let frames = FRAMES[zone] || [];
let i = 0;
let timer = null;

const img = document.getElementById("frame");
const speedSel = document.getElementById("speed");
const zoneSel = document.getElementById("zone");

function stop() {
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
}

function setZone(z) {
  stop();
  zone = z;
  frames = FRAMES[zone] || [];
  i = 0;

  if (frames.length === 0) {
    img.removeAttribute("src");
    return;
  }
  show(0);
}

function show(k) {
  if (frames.length === 0) return;
  i = (k + frames.length) % frames.length;
  img.src = frames[i];
}

function play() {
  if (frames.length === 0) return;
  stop();
  const ms = parseInt(speedSel.value, 10);
  timer = setInterval(() => show(i + 1), ms);
}

document.getElementById("prev").onclick = () => { stop(); show(i - 1); };
document.getElementById("next").onclick = () => { stop(); show(i + 1); };
document.getElementById("pause").onclick = () => { stop(); };
document.getElementById("play").onclick  = () => { play(); };

speedSel.addEventListener("change", () => {
  if (timer) play();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") { stop(); show(i-1); }
  if (e.key === "ArrowRight") { stop(); show(i+1); }
  if (e.code === "Space") {
    e.preventDefault();
    if (timer) stop(); else play();
  }
});

for (const z of Object.keys(FRAMES)) {
  const opt = document.createElement("option");
  opt.value = z;
  opt.textContent = z;
  zoneSel.appendChild(opt);
}
zoneSel.onchange = () => setZone(zoneSel.value);

setZone(zoneSel.value = zone);
</script>
